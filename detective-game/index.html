<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Detective VN</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">

    <!-- PANEL DOWODÓW -->
    <div id="evidencePanel">
        <h3>Dowody</h3>
        <ul id="evidenceList"></ul>
    </div>

    <!-- КНОПКА БЛОКНОТА -->
    <img id="notebookIMG" src="images/pd.png">
    <img id="notebookBtn" src="images/bn.png">
    
    <!-- ЛЕВЫЕ КНОПКИ -->
    <div id="leftChoices"></div>

    <!-- ДИАЛОГОВЫЕ КНОПКИ -->
    <div id="dialogChoices"></div>

    <!-- ДИАЛОГ -->
    <div id="dialogBox">
        <div id="name"></div>
        <div id="text"></div>
    </div>

    <!-- ПАНЕЛЬ ПОДОЗРЕВАЕМЫХ -->
    <div id="suspectsPanel" class="hidden">

        <div id="suspectsContent">
            <img src="images/sus1.png">
            <img src="images/sus2.png">
            <img src="images/sus3.png">
            <img src="images/sus4.png">
        </div>

        <button id="closeSuspects">Zamknij</button>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
