<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Detective VN</title>
<link rel="stylesheet" href="style.css">
<script src="interrogations.js" defer></script>
<script src="scenes.js" defer></script>
<script src="script.js" defer></script>

</head>
<body>

<div id="game">
    <div id="introScreen">

        <img src="images/sr.png" id="introImage">

        <button id="startGameBtn">Zamknij</button>

    </div>
    <!-- PANEL DOWODÓW -->
    <div id="evidencePanel">
        <h3>Dowody</h3>
        <ul id="evidenceList"></ul>
    </div>

    <img id="notebookIMG" src="images/pd.png">
    <img id="notebookBtn" src="images/bn.png">
    
    <img id="pintableIMG" src="images/ds.png">
    <div id="leftChoices"></div>
    
    <div id="dialogChoices"></div>
    <div id="characters">
        <img id="detective" src="images/gd.png">
        <img id="suspect">
    </div>
    <div id="dialogBox">
        <div id="name"></div>
        <div id="text"></div>
    </div>

    <div id="suspectsPanel" class="hidden">

    <div id="suspectsContent">

    <div class="suspect">
        <img src="images/sus1.png">
        <button class="leftBtn" onclick="accuse('student')">Oskarżyć</button>
    </div>

    <div class="suspect">
        <img src="images/sus2.png">
        <button class="leftBtn" onclick="accuse('assistant')">Oskarżyć</button>
    </div>

    <div class="suspect">
        <img src="images/sus3.png">
        <button class="leftBtn" onclick="accuse('professor2')">Oskarżyć</button>
    </div>

</div>

    <button id="closeSuspects">Zamknij</button>
</div>

<!-- ВНЕ панели -->
<div id="endingScreen" class="hidden">
    <div id="endingText"></div>
    <button onclick="location.reload()">Zagraj ponownie</button>
</div>

</div>

</body>
</html>
